<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charles English · </title>
    <style>
        /* ========== CSS变量 — 黑白风格 ========== */
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F5F5;
            --bg-card: #FFFFFF;
            --text-primary: #111111;
            --text-secondary: #444444;
            --text-muted: #888888;
            --border-color: #222222;
            --border-light: #DDDDDD;
            --accent: #000000;
            --accent-light: #333333;
            --accent-bg: #F0F0F0;
            --shadow: rgba(0, 0, 0, 0.1);
            --shadow-hover: rgba(0, 0, 0, 0.2);
            --tag-operations: #E0E0E0;
            --tag-general: #D0D0D0;
            --tag-picturable: #C0C0C0;
            --tag-qualities: #B0B0B0;
            --tag-opposites: #A0A0A0;
            --overlay: rgba(0, 0, 0, 0.8);
            --uk-color: #000000;
            --us-color: #666666;
        }

        [data-theme="dark"] {
            --bg-primary: #0A0A0A;
            --bg-secondary: #151515;
            --bg-card: #1A1A1A;
            --text-primary: #F0F0F0;
            --text-secondary: #CCCCCC;
            --text-muted: #888888;
            --border-color: #FFFFFF;
            --border-light: #333333;
            --accent: #FFFFFF;
            --accent-light: #DDDDDD;
            --accent-bg: #222222;
            --shadow: rgba(255, 255, 255, 0.05);
            --shadow-hover: rgba(255, 255, 255, 0.1);
            --tag-operations: #2A2A2A;
            --tag-general: #252525;
            --tag-picturable: #202020;
            --tag-qualities: #1A1A1A;
            --tag-opposites: #151515;
            --overlay: rgba(0, 0, 0, 0.9);
            --uk-color: #FFFFFF;
            --us-color: #999999;
        }

        /* ========== 基础样式 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ========== 头部 ========== */
        .header {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .logo h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .logo .subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        /* ========== 搜索框 ========== */
        .search-box {
            flex: 1;
            min-width: 200px;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.6rem 1rem 0.6rem 2.5rem;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .search-box::before {
            content: "⌕";
            position: absolute;
            left: 0.8rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1rem;
            color: var(--text-muted);
        }

        .search-box .shortcut {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: var(--bg-primary);
            border: 1px solid var(--border-light);
            border-radius: 4px;
            padding: 0.1rem 0.4rem;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* ========== 工具栏 ========== */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .toolbar-group {
            display: flex;
            align-items: center;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            overflow: hidden;
        }

        .toolbar-btn {
            padding: 0.4rem 0.8rem;
            border: none;
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .toolbar-btn:hover {
            background: var(--accent-bg);
        }

        .toolbar-btn.active {
            background: var(--accent);
            color: var(--bg-primary);
        }

        /* ========== 发音切换 ========== */
        .accent-toggle {
            display: flex;
            align-items: center;
            gap: 0;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            overflow: hidden;
        }

        .accent-btn {
            padding: 0.5rem 1rem;
            border: none;
            background: var(--bg-primary);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .accent-btn.uk {
            color: var(--text-muted);
        }

        .accent-btn.us {
            color: var(--text-muted);
        }

        .accent-btn.active.uk {
            background: var(--uk-color);
            color: var(--bg-primary);
        }

        .accent-btn.active.us {
            background: var(--us-color);
            color: var(--bg-primary);
        }

        .accent-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .accent-dot.uk { background: #000; }
        .accent-dot.us { background: #666; }

        [data-theme="dark"] .accent-dot.uk { background: #fff; }
        [data-theme="dark"] .accent-dot.us { background: #999; }

        /* ========== 分类导航 ========== */
        .categories {
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-light);
            padding: 1rem 2rem;
        }

        .categories-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .cat-btn {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
            white-space: nowrap;
        }

        .cat-btn:hover {
            border-color: var(--accent);
        }

        .cat-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg-primary);
        }

        .cat-btn .count {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-left: 0.25rem;
        }

        /* ========== 主内容区 ========== */
        .main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .section-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
        }

        .section-count {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ========== 单词网格 ========== */
        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        /* ========== 单词卡片 ========== */
        .word-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            padding: 1.2rem;
            transition: all 0.15s;
        }

        .word-card:hover {
            box-shadow: 0 2px 12px var(--shadow-hover);
        }

        .word-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 0.6rem;
        }

        .word-main {
            flex: 1;
        }

        .word-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        .word-phonetic {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-family: "SF Mono", "Fira Code", monospace;
            margin-top: 0.15rem;
        }

        .word-tag {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .tag-OP { background: var(--tag-operations); color: #333; }
        .tag-GT { background: var(--tag-general); color: #333; }
        .tag-PT { background: var(--tag-picturable); color: #333; }
        .tag-QG { background: var(--tag-qualities); color: #333; }
        .tag-OPP { background: var(--tag-opposites); color: #333; }

        [data-theme="dark"] .tag-OP,
        [data-theme="dark"] .tag-GT,
        [data-theme="dark"] .tag-PT,
        [data-theme="dark"] .tag-QG,
        [data-theme="dark"] .tag-OPP { color: #CCC; }

        .speak-btn {
            background: none;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 0.3rem 0.6rem;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-muted);
            transition: all 0.15s;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .speak-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .speak-btn .accent-indicator {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }

        .speak-btn .accent-indicator.uk { background: #000; }
        .speak-btn .accent-indicator.us { background: #666; }

        [data-theme="dark"] .speak-btn .accent-indicator.uk { background: #fff; }
        [data-theme="dark"] .speak-btn .accent-indicator.us { background: #999; }

        /* ========== 中文释义 ========== */
        .word-zh {
            font-size: 1.05rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .word-explain {
            font-size: 0.82rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            line-height: 1.5;
        }

        /* ========== 英文释义 ========== */
        .definition-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 0.2rem;
            font-weight: 600;
        }

        .word-en {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.6rem;
            font-style: italic;
        }

        /* ========== 例句 ========== */
        .example-box {
            background: var(--accent-bg);
            border-left: 2px solid var(--accent);
            padding: 0.5rem 0.8rem;
            border-radius: 0 6px 6px 0;
            margin-bottom: 0.6rem;
        }

        .example-en {
            font-size: 0.82rem;
            color: var(--text-primary);
            margin-bottom: 0.15rem;
        }

        .example-zh {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .example-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.3rem;
        }

        .example-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        .example-speak-btn {
            background: none;
            border: 1px solid var(--border-light);
            border-radius: 4px;
            padding: 0.15rem 0.4rem;
            cursor: pointer;
            font-size: 0.65rem;
            color: var(--text-muted);
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .example-speak-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ========== 近义词 ========== */
        .synonyms {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .synonym-tag {
            padding: 0.2rem 0.6rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 12px;
            font-size: 0.72rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .synonym-tag:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ========== 卡片练习 ========== */
        .flashcard-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--overlay);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .flashcard-overlay.active {
            display: flex;
        }

        .flashcard {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 3rem;
            max-width: 500px;
            width: 90%;
            text-align: center;
            position: relative;
        }

        .flashcard-word {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .flashcard-phonetic {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
            font-family: "SF Mono", monospace;
        }

        .flashcard-accent {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: inline-block;
        }

        .flashcard-accent.uk {
            background: #000;
            color: #fff;
        }

        .flashcard-accent.us {
            background: #666;
            color: #fff;
        }

        [data-theme="dark"] .flashcard-accent.uk {
            background: #fff;
            color: #000;
        }

        [data-theme="dark"] .flashcard-accent.us {
            background: #999;
            color: #000;
        }

        .flashcard-speak {
            background: none;
            border: 1px solid var(--border-light);
            border-radius: 6px;
            padding: 0.4rem 1rem;
            cursor: pointer;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            transition: all 0.15s;
        }

        .flashcard-speak:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .flashcard-hint {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            cursor: pointer;
        }

        .flashcard-answer {
            display: none;
            text-align: left;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-light);
        }

        .flashcard-answer.show {
            display: block;
        }

        .flashcard-zh {
            font-size: 1.2rem;
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .flashcard-en {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-style: italic;
        }

        .flashcard-controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 2rem;
        }

        .flashcard-btn {
            padding: 0.6rem 1.2rem;
            border: 1px solid var(--border-light);
            border-radius: 8px;
            background: var(--bg-card);
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.15s;
        }

        .flashcard-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .flashcard-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: var(--bg-primary);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            z-index: 2000;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ========== 页脚 ========== */
        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.75rem;
            border-top: 1px solid var(--border-light);
            margin-top: 2rem;
        }

        .shortcuts {
            margin-top: 0.5rem;
        }

        .shortcuts kbd {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: 3px;
            padding: 0.1rem 0.4rem;
            font-family: monospace;
            font-size: 0.7rem;
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .header { padding: 1rem; }
            .header-content { gap: 1rem; }
            .search-box { max-width: 100%; order: 3; width: 100%; }
            .categories { padding: 0.8rem 1rem; }
            .main { padding: 1rem; }
            .words-grid { grid-template-columns: 1fr; }
            .flashcard { padding: 2rem; }
            .flashcard-word { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <h1>Charles English</h1>
                <div class="subtitle"></div>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索单词、释义或例句...">
                <span class="shortcut">/</span>
            </div>
            <div class="toolbar">
                <div class="accent-toggle">
                    <button class="accent-btn uk active" id="btnUK" onclick="setAccent('uk')">
                        <span class="accent-dot uk"></span> UK
                    </button>
                    <button class="accent-btn us" id="btnUS" onclick="setAccent('us')">
                        <span class="accent-dot us"></span> US
                    </button>
                </div>
                <div class="toolbar-group">
                    <button class="toolbar-btn" id="btnLight" onclick="setTheme('light')">Light</button>
                    <button class="toolbar-btn active" id="btnDark" onclick="setTheme('dark')">Dark</button>
                </div>
                <div class="toolbar-group">
                    <button class="toolbar-btn active" id="btnSimplified" onclick="setChinese('simplified')">简</button>
                    <button class="toolbar-btn" id="btnTraditional" onclick="setChinese('traditional')">繁</button>
                </div>
                <button class="toolbar-btn" onclick="openFlashcard()">卡片练习</button>
            </div>
        </div>
    </header>

    <nav class="categories">
        <div class="categories-content">
            <button class="cat-btn active" data-cat="all" onclick="filterCategory('all')">All <span class="count">850</span></button>
            <button class="cat-btn" data-cat="OP" onclick="filterCategory('OP')">Operations <span class="count">100</span></button>
            <button class="cat-btn" data-cat="GT" onclick="filterCategory('GT')">General Things <span class="count">400</span></button>
            <button class="cat-btn" data-cat="PT" onclick="filterCategory('PT')">Picturable <span class="count">200</span></button>
            <button class="cat-btn" data-cat="QG" onclick="filterCategory('QG')">Qualities <span class="count">100</span></button>
            <button class="cat-btn" data-cat="OPP" onclick="filterCategory('OPP')">Opposites <span class="count">50</span></button>
        </div>
    </nav>

    <main class="main" id="mainContent"></main>

    <div class="flashcard-overlay" id="flashcardOverlay">
        <div class="flashcard">
            <button class="flashcard-close" onclick="closeFlashcard()">×</button>
            <div class="flashcard-word" id="flashcardWord"></div>
            <div class="flashcard-phonetic" id="flashcardPhonetic"></div>
            <div class="flashcard-accent" id="flashcardAccent"></div>
            <button class="flashcard-speak" onclick="speakCurrentWord()">🔊 再听一次</button>
            <div class="flashcard-hint" onclick="toggleFlashcardAnswer()">点击翻牌</div>
            <div class="flashcard-answer" id="flashcardAnswer">
                <div class="flashcard-zh" id="flashcardZh"></div>
                <div class="flashcard-en" id="flashcardEn"></div>
            </div>
            <div class="flashcard-controls">
                <button class="flashcard-btn" onclick="prevCard()">← 上一个</button>
                <button class="flashcard-btn" onclick="randomCard()">随机</button>
                <button class="flashcard-btn" onclick="nextCard()">下一个 →</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <footer class="footer">
        <p>基于 Charles English · 仅供学习使用</p>
        <div class="shortcuts">
            <kbd>/</kbd> 搜索 · <kbd>Esc</kbd> 关闭 · <kbd>Space</kbd> 翻牌
        </div>
    </footer>

    <script>
        const WORDS = [{"word": "come", "phonetic": "/kʌm/", "category": "OP", "zh": "来,前来", "zhExplain": "朝说话者或目标靠近，让彼此距离变短。", "en": "move toward the speaker or a place", "example": "Come here when you're ready.", "exampleZh": "准备好了就过来。", "synonyms": ["arrive", "approach", "reach"]}, {"word": "get", "phonetic": "/ɡɛt/", "category": "OP", "zh": "得到,获得;变得", "zhExplain": "把东西收到手里，或让状态变成新的样子。", "en": "obtain, become, or receive", "example": "I'll get a new book tomorrow.", "exampleZh": "我明天会买本新书。", "synonyms": ["obtain", "receive", "acquire"]}, {"word": "give", "phonetic": "/ɡɪv/", "category": "OP", "zh": "给,赠予", "zhExplain": "把自己这边的东西交到别人那边，让所有权换手。", "en": "transfer something to another", "example": "Please give me your hand.", "exampleZh": "请把手伸给我。", "synonyms": ["offer", "hand", "present"]}, {"word": "go", "phonetic": "/ɡəʊ/", "category": "OP", "zh": "去,离开", "zhExplain": "离开当前位置，朝另一个地方移动过去。", "en": "move away or proceed", "example": "We go to school every day.", "exampleZh": "我们每天都去学校。", "synonyms": ["leave", "depart", "proceed"]}, {"word": "keep", "phonetic": "/kiːp/", "category": "OP", "zh": "保持,保留", "zhExplain": "把东西或状态留住，不让它跑掉或改变。", "en": "hold or maintain in a state", "example": "Keep the door open, please.", "exampleZh": "请让门开着。", "synonyms": ["hold", "retain", "maintain"]}, {"word": "let", "phonetic": "/lɛt/", "category": "OP", "zh": "让,允许", "zhExplain": "把拦住的门打开，让别人可以自由去做某事。", "en": "allow or permit", "example": "Let me try it once more.", "exampleZh": "让我再试一次。", "synonyms": ["allow", "permit", "enable"]}, {"word": "make", "phonetic": "/meɪk/", "category": "OP", "zh": "做,制造", "zhExplain": "动手造成一个东西，或让事情变成某种样子。", "en": "create, build, or cause", "example": "She made a cake for us.", "exampleZh": "她为我们做了个蛋糕。", "synonyms": ["create", "build", "produce"]}, {"word": "put", "phonetic": "/pʊt/", "category": "OP", "zh": "放,置", "zhExplain": "把东西安放到某个位置上，让它停在那里。", "en": "place in a position", "example": "Put the book on the table.", "exampleZh": "把书放在桌上。", "synonyms": ["place", "set", "lay"]}, {"word": "seem", "phonetic": "", "category": "OP", "zh": "似乎,看起来", "zhExplain": "外表给人一种感觉，像是某种情况正在那里。", "en": "appear or give the impression", "example": "You seem tired today.", "exampleZh": "你今天看起来很累。", "synonyms": ["appear", "look", "feel like"]}, {"word": "take", "phonetic": "", "category": "OP", "zh": "拿,带走", "zhExplain": "伸手拿住并带走，或把递来的东西接过来。", "en": "grasp, carry, or accept", "example": "Take this letter to her.", "exampleZh": "把这封信带给她。", "synonyms": ["grab", "carry", "accept"]}, {"word": "be", "phonetic": "", "category": "OP", "zh": "是,存在", "zhExplain": "人或东西就在那里，并处在某种样子里。", "en": "exist or have a state", "example": "To be or not to be.", "exampleZh": "生存还是毁灭。", "synonyms": ["exist", "stay", "remain"]}, {"word": "do", "phonetic": "", "category": "OP", "zh": "做,执行", "zhExplain": "把想做的事落到手上，真的动起来完成它。", "en": "perform an action", "example": "Do your work first.", "exampleZh": "先做你的工作。", "synonyms": ["perform", "act", "carry out"]}, {"word": "have", "phonetic": "", "category": "OP", "zh": "有,拥有", "zhExplain": "某物在自己这边，归自己掌握或随身带着。", "en": "possess or hold", "example": "I have two sisters.", "exampleZh": "我有两个姐妹。", "synonyms": ["own", "possess", "hold"]}, {"word": "say", "phonetic": "", "category": "OP", "zh": "说,讲", "zhExplain": "把心里的话用声音或文字送到外面，让别人接到。", "en": "speak or state aloud", "example": "What did you say to him?", "exampleZh": "你对他说了什么?", "synonyms": ["speak", "tell", "state"]}, {"word": "see", "phonetic": "", "category": "OP", "zh": "看见,理解", "zhExplain": "眼睛接住画面，心里也可能跟着看明白。", "en": "perceive with eyes or mind", "example": "I see what you mean.", "exampleZh": "我明白你的意思了。", "synonyms": ["look", "view", "understand"]}, {"word": "send", "phonetic": "", "category": "OP", "zh": "送,寄", "zhExplain": "让人或东西从这里出发，去到指定的另一边。", "en": "cause to go or be delivered", "example": "Send the parcel by post.", "exampleZh": "通过邮寄把包裹寄出去。", "synonyms": ["dispatch", "mail", "forward"]}, {"word": "may", "phonetic": "", "category": "OP", "zh": "可以,可能", "zh belonging to", "from", "about"]}, {"word": "till", "phonetic": "", "category": "OP", "zh": "直到", "zhExplain": "时间一路延到某个点，到了那里才停下来。", "en": "up to a certain time", "example": "Wait till noon.", "exampleZh": "等到中午。", "synonyms": ["until", "up to", "through"]}, {"word": "than", "phonetic": "", "category": "OP", "zh": "比", "zhExplain": "把两边拉出来比较，看哪一边更怎样一些。", "en": "used in comparisons", "example": "She is taller than me.", "exampleZh": "她比我高。", "synonyms": ["compared to", "versus", "over"]}, {"word": "a", "phonetic": "", "category": "OP", "zh": "一个", "zhExplain": "从同类中随手拎出一个，不指定具体是哪一个。", "en": "indefinite article, one of", "example": "I saw a dog.", "exampleZh": "我看见一只狗。", "synonyms": ["one", "any", "some"]}, {"word": "the", "phonetic": "", "category": "OP", "zh": "那个,这个", "zhExplain": "手指点向已知道的那一个，不是随便一个。", "en": "definite article, specific", "example": "The book is on the desk.", "exampleZh": "那本书在桌上。", "synonyms": ["this", "that", "said"]}, {"word": "all", "phonetic": "", "category": "OP", "zh": "全部,所有", "zhExplain": "把一整堆都收进来，一个也不落在外面。", "en": "the whole quantity of", "example": "All children love play.", "exampleZh": "所有孩子都爱玩。", "synonyms": ["every", "entire", "whole"]}, {"word": "any", "phonetic": "", "category": "OP", "zh": "任何", "zhExplain": "随便哪一个都可以，不需要先挑定对象。", "en": "one or some, no matter which", "example": "Do you have any money?", "exampleZh": "你有钱吗?", "synonyms": ["some", "every", "whichever"]}, {"word": "every", "phonetic": "", "category": "OP", "zh": "每个", "zhExplain": "一个接一个全算进去，没有任何一个漏掉。", "en": "each one without exception", "example": "Every day brings hope.", "exampleZh": "每天都带来希望。", "synonyms": ["each", "all", "any"]}, {"word": "little", "phonetic": "", "category": "OP", "zh": "少,小", "zhExplain": "数量或尺寸很小，只占很少的一点点空间。", "en": "small in amount or size", "example": "Add a little salt.", "exampleZh": "加一点点盐。", "synonyms": ["small", "slight", "tiny"]}, {"word": "much", "phonetic": "", "category": "OP", "zh": "许多,大量", "zhExplain": "量堆得很多，感觉分量很足很满很重。", "en": "a large amount of", "example": "Thank you very much.", "exampleZh": "非常感谢你。", "synonyms": ["a lot", "plenty", "greatly"]}, {"word": "no", "phonetic": "", "category": "OP", "zh": "不,没有", "zhExplain": "把可能性关掉，留下空无、拒绝或不存在。", "en": "negation or refusal", "example": "No water is left.", "exampleZh": "没有水剩下了。", "synonyms": ["not", "none", "zero"]}, {"word": "other", "phonetic": "", "category": "OP", "zh": "其他的,另外的", "zhExplain": "从眼前这个换到另一个不同的对象那边。", "en": "different or additional", "example": "Try the other door.", "exampleZh": "试试另一扇门。", "synonyms": ["another", "different", "alternative"]}, {"word": "some", "phonetic": "", "category": "OP", "zh": "一些", "zhExplain": "拿出一点或几个，但不把全部数量说清楚。", "en": "an unspecified amount", "example": "Have some tea.", "exampleZh": "喝点茶吧。", "synonyms": ["a few", "several", "any"]}, {"word": "such", "phonetic": "", "category": "OP", "zh": "这样的", "zhExplain": "把眼前东西归到这种样子、这种程度里。", "en": "of that kind or degree", "example": "Such a kind man!", "exampleZh": "多么善良的人啊!", "synonyms": ["like that", "this kind of", "so"]}, {"word": "that", "phonetic": "", "category": "OP", "zh": "那个", "zhExplain": "手指向较远处，或指回已经提到的那个东西。", "en": "referring to something distant", "example": "That book is mine.", "exampleZh": "那本书是我的。", "synonyms": ["which", "the one", "yon"]}, {"word": "this", "phonetic": "", "category": "OP", "zh": "这个", "zhExplain": "手指向眼前近处，或正在谈的这个东西。", "en": "referring to something near", "example": "This is my house.", "exampleZh": "这是我家。", "synonyms": ["the present", "the current", "here"]}, {"word": "I", "phonetic": "", "category": "OP", "zh": "我", "zhExplain": "说话的人把自己放在句子中心，从自己出发。", "en": "the speaker himself or herself", "example": "I love reading.", "exampleZh": "我喜欢阅读。", "synonyms": ["me", "myself", "self"]}, {"word": "he", "phonetic": "", "category": "OP", "zh": "他", "zhExplain": "把话里的男性单独拎出来，继续指向他。", "en": "a male person previously mentioned", "example": "He is my brother.", "exampleZh": "他是我兄弟。", "synonyms": ["him", "that man", "the male"]}, {"word": "you", "phonetic": "", "category": "OP", "zh": "你,你们", "zhExplain": "说话时把目光对准听话的人，让话落到对方身上。", "en": "the person spoken to", "example": "You are very kind.", "exampleZh": "你真好。", "synonyms": ["thou", "ye", "one"]}, {"word": "who", "phonetic": "", "category": "OP", "zh": "谁", "zhExplain": "把问题投向某个人，追问到底是哪一位。", "en": "asking which person", "example": "Who is that man?", "exampleZh": "那个人是谁?", "synonyms": ["which person", "what person", "whom"]}, {"word": "and", "phonetic": "", "category": "OP", "zh": "和,与", "zhExplain": "把两个想法或东西并排接上，让它们同在。", "en": "connecting two similar things", "example": "Tom and Jerry.", "exampleZh": "汤姆和杰瑞。", "synonyms": ["plus", "also", "as well as"]}, {"word": "because", "phonetic": "", "category": "OP", "zh": "因为", "zhExplain": "在事情后面接上一条原因，说明为什么会这样。", "en": "giving a reason", "example": "I'm late because of traffic.", "exampleZh": "我迟到是因为堵车。", "synonyms": ["since", "as", "due to"]}, {"word": "but", "phonetic": "", "category": "OP", "zh": "但是", "zhExplain": "前后方向忽然一转，后面挡住前面的预期。", "en": "introducing a contrast", "example": "Small but strong.", "exampleZh": "小但强壮。", "synonyms": ["yet", "however", "though"]}, {"word": "or", "phonetic": "", "category": "OP", "zh": "或者", "zhExplain": "摆出几条可能的路，让人从中挑选一条。", "en": "presenting alternatives", "example": "Tea or coffee?", "exampleZh": "茶还是咖啡?", "synonyms": ["either", "alternatively", "otherwise"]}, {"word": "if", "phonetic": "", "category": "OP", "zh": "如果", "zhExplain": "先放一个条件，条件成立时事情才往下走。", "en": "introducing a condition", "example": "If it rains, stay home.", "exampleZh": "如果下雨就待在家。", "synonyms": ["provided that", "when", "supposing"]}, {"word": "though", "phonetic": "", "category": "OP", "zh": "尽管", "zhExplain": "先承认阻碍还在，事情却仍然照样发生。", "en": "despite the fact that", "example": "Though tired, she smiled.", "exampleZh": "尽管累,她还是笑了。", "synonyms": ["although", "even if", "despite"]}, {"word": "while", "phonetic": "", "category": "OP", "zh": "当...时,虽然", "zhExplain": "两件事在同一段时间里一起并行发生。", "e  "ahead", "frontward"]}, {"word": "here", "phonetic": "", "category": "OP", "zh": "这里", "zhExplain": "说话者所在或手正指着的这个地方这里。", "en": "in or to this place", "example": "Come here, please.", "exampleZh": "请到这里来。", "synonyms": ["at this place", "hither", "in this spot"]}, {"word": "near", "phonetic": "", "category": "OP", "zh": "靠近", "zhExplain": "距离很短，已经靠得几乎贴到身边附近。", "en": "at a short distance", "example": "He lives near the park.", "exampleZh": "他住在公园附近。", "synonyms": ["close", "beside", "nearby"]}, {"word": "now", "phonetic": "", "category": "OP", "zh": "现在", "zhExplain": "时间落在正在发生的这一刻，不是过去将来。", "en": "at the present time", "example": "Do it now.", "exampleZh": "现在就做。", "synonyms": ["currently", "at present", "right away"]}, {"word": "out", "phonetic": "", "category": "OP", "zh": "在外,出去", "zhExplain": "从里面离开，跨出边界来到外面空间。", "en": "away from inside", "example": "Go out and play.", "exampleZh": "出去玩吧。", "synonyms": ["outside", "outward", "beyond"]}, {"word": "still", "phonetic": "", "category": "OP", "zh": "仍然", "zhExplain": "到现在还没有停，原来的状态继续留着。", "en": "continuing up to now", "example": "He is still working.", "exampleZh": "他还在工作。", "synonyms": ["yet", "even now", "nonetheless"]}, {"word": "then", "phonetic": "", "category": "OP", "zh": "那时,然后", "zhExplain": "时间走到那一刻，或下一步顺着接上来。", "en": "at that time or next", "example": "First eat, then sleep.", "exampleZh": "先吃饭,然后睡觉。", "synonyms": ["next", "afterward", "at that time"]}, {"word": "there", "phonetic": "", "category": "OP", "zh": "那里", "zhExplain": "指向离说话者较远处的那个地方那边。", "en": "in or at that place", "example": "Sit over there.", "exampleZh": "坐到那边去。", "synonyms": ["at that place", "yonder", "thither"]}, {"word": "together", "phonetic": "", "category": "OP", "zh": "一起", "zhExplain": "分开的东西聚到一处，彼此靠拢一起行动。", "en": "in one group or company", "example": "We sing together.", "exampleZh": "我们一起唱歌。", "synonyms": ["jointly", "collectively", "in unison"]}, {"word": "well", "phonetic": "", "category": "OP", "zh": "好,健康地", "zhExplain": "事情 onyms": ["uneven", "coarse", "bumpy"]}, {"word": "sad", "phonetic": "", "category": "OPP", "zh": "悲伤的", "zhExplain": "心往下沉，像失去光亮和期待。", "en": "feeling unhappy", "example": "A sad story.", "exampleZh": "悲伤的故事。", "synonyms": ["unhappy", "sorrowful", "blue"]}, {"word": "safe", "phonetic": "", "category": "OPP", "zh": "安全的", "zhExplain": "危险被隔在外面，里面可以安心停留。", "en": "free from harm", "example": "Stay safe.", "exampleZh": "注意安全。", "synonyms": ["secure", "protected", "sound"]}, {"word": "secret", "phonetic": "", "category": "OPP", "zh": "秘密的", "zhExplain": "信息被藏起来，只让少数人知道。", "en": "hidden from others", "example": "A secret garden.", "exampleZh": "秘密花园。", "synonyms": ["hidden", "private", "confidential"]}, {"word": "short", "phonetic": "", "category": "OPP", "zh": "短的", "zhExplain": "从头到尾距离小，时间或长度很快结束。", "en": "of small length", "example": "A short walk.", "exampleZh": "短暂的散步。", "synonyms": ["brief", "small", "stubby"]}, {"word": "shut", "phonetic": "", "category": "OPP", "zh": "关着的", "zhExplain": "入口被合上，内外被一道界线分开。", "en": "closed", "example": "The door is shut.", "exampleZh": "门关着。", "synonyms": ["closed", "sealed", "locked"]}, {"word": "simple", "phonetic": "", "category": "OPP", "zh": "简单的", "zhExplain": "部分很少，路线直接，容易一眼明白。", "en": "not complex", "example": "A simple answer.", "exampleZh": "简单的答案。", "synonyms": ["easy", "plain", "basic"]}, {"word": "slow", "phonetic": "", "category": "OPP", "zh": "慢的", "zhExplain": "动作把时间拉长，一步一步才往前。", "en": "not fast", "example": "A slow turtle.", "exampleZh": "慢吞吞的乌龟。", "synonyms": ["sluggish", "gradual", "leisurely"]}, {"word": "small", "phonetic": "", "category": "OPP", "zh": "小的", "zhExplain": "占的空间很少，分量和范围都缩着。", "en": "not large", "example": "A small house.", "exampleZh": "小房子。", "synonyms": ["little", "tiny", "mini"]}, {"word": "soft", "phonetic": "", "category": "OPP", "zh": "柔软的", "zhExplain": "受力会让步，触感温和不顶人。", "en": "easy to press", "example": "A soft pillow.", "exampleZh": "软枕头。", "synonyms": ["gentle", "tender", "supple"]}, {"word": "solid", "phonetic": "", "category": "OPP", "zh": "固体的", "zhExplain": "内部充实成块，不是空的也不易散。", "en": "not liquid or gas", "example": "Solid rock.", "exampleZh": "坚硬的岩石。", "synonyms": ["hard", "firm", "dense"]}, {"word": "special", "phonetic": "", "category": "OPP", "zh": "特别的", "zhExplain": "从普通之中被挑出，带着独有标记。", "en": "different from usual", "example": "A special day.", "exampleZh": "特别的日子。", "synonyms": ["unique", "particular", "exceptional"]}, {"word": "strange", "phonetic": "", "category": "OPP", "zh": "奇怪的", "zhExplain": "不合熟悉经验，让人停下来多看一眼。", "en": "unusual or unknown", "example": "A strange noise.", "exampleZh": "奇怪的声音。", "synonyms": ["odd", "weird", "unfamiliar"]}, {"word": "thin", "phonetic": "", "category": "OPP", "zh": "瘦的;薄的", "zhExplain": "两面距离很小，像一层轻薄的片。", "en": "not thick", "example": "A thin slice.", "exampleZh": "薄薄一片。", "synonyms": ["slim", "slender", "slight"]}, {"word": "white", "phonetic": "", "category": "OPP", "zh": "白色的", "zhExplain": "光被铺开成最亮净色，没有其他颜色压住。", "en": "color of snow", "example": "White clouds.", "exampleZh": "白云。", "synonyms": ["pale", "ivory", "snowy"]}, {"word": "wrong", "phonetic": "", "category": "OPP", "zh": "错的", "zhExplain": "走偏了应有方向，和正确位置不相合。", "en": "not correct", "example": "A wrong answer.", "exampleZh": "错误答案。", "synonyms": ["incorrect", "mistaken", "false"]}];

        const state = {
            currentCategory: 'all',
            isUKAccent: true,
            isDarkMode: true,
            isSimplified: true,
            searchQuery: '',
            flashcardIndex: 0
        };

        const categoryNames = {
            'OP': { zh: '操作词', en: 'Operations', desc: '' },
            'GT': { zh: '通用词', en: 'General Things', desc: '' },
            'PT': { zh: '图示词', en: 'Picturable', desc: '' },
            'QG': { zh: '性质词', en: 'Qualities', desc: '' },
            'OPP': { zh: '反义对', en: 'Opposites', desc: '' }
        };

        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            renderWords();
            setupEventListeners();
        });

        function loadSettings() {
            state.isDarkMode = localStorage.getItem('theme') !== 'light';
            state.isUKAccent = localStorage.getItem('accent') !== 'us';
            state.isSimplified = localStorage.getItem('chinese') !== 'traditional';
            
            document.documentElement.setAttribute('data-theme', state.isDarkMode ? 'dark' : '');
            updateButtons();
        }

        function updateButtons() {
            document.getElementById('btnUK').classList.toggle('active', state.isUKAccent);
            document.getElementById('btnUS').classList.toggle('active', !state.isUKAccent);
            document.getElementById('btnLight').classList.toggle('active', !state.isDarkMode);
            document.getElementById('btnDark').classList.toggle('active', state.isDarkMode);
            document.getElementById('btnSimplified').classList.toggle('active', state.isSimplified);
            document.getElementById('btnTraditional').classList.toggle('active', !state.isSimplified);
        }

        function setupEventListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                state.searchQuery = e.target.value.toLowerCase();
                renderWords();
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
                    e.preventDefault();
                    document.getElementById('searchInput').focus();
                }
                if (e.key === 'Escape') {
                    document.getElementById('searchInput').blur();
                    closeFlashcard();
                }
                if (e.key === ' ' && document.getElementById('flashcardOverlay').classList.contains('active')) {
                    e.preventDefault();
                    toggleFlashcardAnswer();
                }
            });
        }

        function renderWords() {
            const main = document.getElementById('mainContent');
            let filtered = getFilteredWords();
            
            const groups = {};
            filtered.forEach(w => {
                if (!groups[w.category]) groups[w.category] = [];
                groups[w.category].push(w);
            });

            let html = '';
            
            if (state.currentCategory === 'all') {
                for (const [cat, words] of Object.entries(groups)) {
                    html += renderCategorySection(cat, words);
                }
            } else {
                const words = groups[state.currentCategory] || [];
                html += renderCategorySection(state.currentCategory, words);
            }

            if (!html) {
                html = '<div style="text-align:center;padding:3rem;color:var(--text-muted);">没有找到匹配的单词</div>';
            }

            main.innerHTML = html;
        }

        function renderCategorySection(cat, words) {
            const info = categoryNames[cat] || { zh: cat, en: cat, desc: '' };
            
            let html = `
                <div class="section-header">
                    <div>
                        <div class="section-title">${info.en}</div>
                        <div class="section-subtitle">${info.zh} · ${info.desc}</div>
                    </div>
                    <div class="section-count">${words.length} WORDS</div>
                </div>
                <div class="words-grid">
            `;

            words.forEach(w => {
                html += renderWordCard(w);
            });

            html += '</div>';
            return html;
        }

        function renderWordCard(w) {
            const tagClass = w.category;
            const zh = state.isSimplified ? w.zh : (w.zhTw || w.zh);
            const explain = state.isSimplified ? w.zhExplain : (w.zhExplainTw || w.zhExplain);
            const exampleZh = state.isSimplified ? w.exampleZh : (w.exampleZhTw || w.exampleZh);
            const accentLabel = state.isUKAccent ? 'UK' : 'US';
            
            return `
                <article class="word-card">
                    <div class="word-header">
                        <div class="word-main">
                            <div class="word-text">${w.word}</div>
                            <div class="word-phonetic">${w.phonetic || ''}</div>
                        </div>
                        <span class="word-tag tag-${tagClass}">${w.category}</span>
                        <button class="speak-btn" onclick="speakWord('${w.word}')">
                            <span class="accent-indicator ${state.isUKAccent ? 'uk' : 'us'}"></span>
                            ${accentLabel}
                        </button>
                    </div>
                    <div class="word-zh">${zh}</div>
                    <div class="word-explain">${explain}</div>
                    <div class="definition-label">Definition</div>
                    <div class="word-en">${w.en}</div>
                    <div class="example-box">
                        <div class="example-header">
                            <span class="example-label">Example</span>
                            <button class="example-speak-btn" onclick="speakExample('${w.word}')">
                                <span class="accent-indicator ${state.isUKAccent ? 'uk' : 'us'}"></span>
                                朗读例句
                            </button>
                        </div>
                        <div class="example-en">${w.example}</div>
                        <div class="example-zh">${exampleZh}</div>
                    </div>
                    <div class="synonyms">
                        ${(w.synonyms || []).map(s => `<span class="synonym-tag" onclick="searchWord('${s}')">${s}</span>`).join('')}
                    </div>
                </article>
            `;
        }

        function getFilteredWords() {
            let words = [...WORDS];
            
            if (state.currentCategory !== 'all') {
                words = words.filter(w => w.category === state.currentCategory);
            }
            
            if (state.searchQuery) {
                words = words.filter(w => 
                    w.word.toLowerCase().includes(state.searchQuery) ||
                    (w.zh && w.zh.includes(state.searchQuery)) ||
                    (w.zhExplain && w.zhExplain.includes(state.searchQuery)) ||
                    (w.en && w.en.toLowerCase().includes(state.searchQuery)) ||
                    (w.example && w.example.toLowerCase().includes(state.searchQuery))
                );
            }
            
            return words;
        }

        function speakWord(word) {
            const accent = state.isUKAccent ? 'uk' : 'us';
            const audioPath = `audio/${accent}/${word}.mp3`;
            
            const audio = new Audio(audioPath);
            audio.play().catch(() => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.lang = state.isUKAccent ? 'en-GB' : 'en-US';
                    utterance.rate = 0.85;
                    window.speechSynthesis.speak(utterance);
                }
            });
        }

        function speakExample(word) {
            const audioPath = `audio/examples/${word}.mp3`;
            
            const audio = new Audio(audioPath);
            audio.play().catch(() => {
                showToast('例句音频不存在');
            });
        }

        function speakCurrentWord() {
            const w = WORDS[state.flashcardIndex];
            speakWord(w.word);
        }

        function filterCategory(cat) {
            state.currentCategory = cat;
            
            document.querySelectorAll('.cat-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.cat === cat);
            });
            
            renderWords();
        }

        function setAccent(accent) {
            state.isUKAccent = accent === 'uk';
            localStorage.setItem('accent', accent);
            updateButtons();
            renderWords();
            showToast(accent === 'uk' ? '🇬🇧 英式发音' : '🇺🇸 美式发音');
        }

        function setTheme(theme) {
            state.isDarkMode = theme === 'dark';
            document.documentElement.setAttribute('data-theme', state.isDarkMode ? 'dark' : '');
            localStorage.setItem('theme', theme);
            updateButtons();
        }

        function setChinese(type) {
            state.isSimplified = type === 'simplified';
            localStorage.setItem('chinese', type);
            updateButtons();
            renderWords();
        }

        function searchWord(word) {
            document.getElementById('searchInput').value = word;
            state.searchQuery = word.toLowerCase();
            renderWords();
        }

        function openFlashcard() {
            state.flashcardIndex = Math.floor(Math.random() * WORDS.length);
            updateFlashcard();
            document.getElementById('flashcardOverlay').classList.add('active');
        }

        function closeFlashcard() {
            document.getElementById('flashcardOverlay').classList.remove('active');
        }

        function toggleFlashcardAnswer() {
            document.getElementById('flashcardAnswer').classList.toggle('show');
        }

        function updateFlashcard() {
            const w = WORDS[state.flashcardIndex];
            document.getElementById('flashcardWord').textContent = w.word;
            document.getElementById('flashcardPhonetic').textContent = w.phonetic || '';
            
            const accentEl = document.getElementById('flashcardAccent');
            accentEl.textContent = state.isUKAccent ? '🇬🇧 UK' : '🇺🇸 US';
            accentEl.className = 'flashcard-accent ' + (state.isUKAccent ? 'uk' : 'us');
            
            document.getElementById('flashcardZh').textContent = w.zh;
            document.getElementById('flashcardEn').textContent = w.en;
            document.getElementById('flashcardAnswer').classList.remove('show');
            
            // 自动播放单词发音
            speakWord(w.word);
        }

        function prevCard() {
            state.flashcardIndex = (state.flashcardIndex - 1 + WORDS.length) % WORDS.length;
            updateFlashcard();
        }

        function nextCard() {
            state.flashcardIndex = (state.flashcardIndex + 1) % WORDS.length;
            updateFlashcard();
        }

        function randomCard() {
            state.flashcardIndex = Math.floor(Math.random() * WORDS.length);
            updateFlashcard();
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 1500);
        }
    </script>
</body>
</html>
